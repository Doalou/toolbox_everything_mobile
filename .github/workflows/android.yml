name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Missing KEYSTORE_BASE64 secret"
            exit 1
          fi

          KEYSTORE_PATH="${{ github.workspace }}/upload-keystore.jks"
          # Strip any whitespace/CR/LF that might have crept into the secret
          printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 --decode > "$KEYSTORE_PATH"

          if [ ! -s "$KEYSTORE_PATH" ]; then
            echo "::error::Keystore file is empty after decoding"
            exit 1
          fi

          SIZE=$(stat -c%s "$KEYSTORE_PATH")
          echo "Keystore decoded — size: ${SIZE} bytes"

      - name: Verify keystore
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ]; then
            echo "::error::Missing KEYSTORE_PASSWORD/KEY_PASSWORD or KEY_ALIAS secret"
            exit 1
          fi

          set +e
          KEYTOOL_OUTPUT="$(keytool -list \
            -keystore "${{ github.workspace }}/upload-keystore.jks" \
            -storepass "$KEYSTORE_PASSWORD" \
            -alias "$KEY_ALIAS" 2>&1)"
          KEYTOOL_EXIT=$?
          set -e

          if [ "$KEYTOOL_EXIT" -ne 0 ]; then
            echo "$KEYTOOL_OUTPUT"
            echo "::error::Keystore is invalid or password/alias is wrong — re-encode KEYSTORE_BASE64 from your local .jks (see notes)"
            exit 1
          fi

          KEYSTORE_TYPE="$(printf '%s\n' "$KEYTOOL_OUTPUT" | awk -F': ' '/Keystore type:/ {print tolower($2); exit}')"
          if [ -z "$KEYSTORE_TYPE" ]; then
            KEYSTORE_TYPE="pkcs12"
          fi

          echo "KEYSTORE_TYPE=${KEYSTORE_TYPE}" >> "$GITHUB_ENV"
          echo "Keystore verified."
          echo "Keystore type: ${KEYSTORE_TYPE}"

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || secrets.KEY_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_PASSWORD" ] || [ -z "$KEY_ALIAS" ]; then
            echo "::error::Missing one of KEYSTORE_PASSWORD, KEY_PASSWORD or KEY_ALIAS"
            exit 1
          fi

          {
            echo "storePassword=${KEYSTORE_PASSWORD}"
            echo "keyPassword=${KEY_PASSWORD}"
            echo "keyAlias=${KEY_ALIAS}"
            echo "storeFile=${{ github.workspace }}/upload-keystore.jks"
            echo "storeType=${KEYSTORE_TYPE}"
          } > android/key.properties

          grep -E '^(storePassword|keyPassword|keyAlias|storeFile|storeType)=' android/key.properties | sed -E 's/=(.*)$/=<hidden>/'

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14
